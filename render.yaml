projects:
  - name: Whatsapp PDVS
    environments:
      - name: testing 
        services:
          # 1. Redis (Broker e Cache)
          - type: keyvalue
            name: pdvs-redis-broker
            plan: free # Troque para starter se houver atrasos na fila
            region: oregon

          # 2. n8n Main (Editor e Orquestrador)
          - type: web
            name: n8n-main
            env: docker
            dockerfilePath: ./n8n/Dockerfile
            plan: free
            region: oregon
            healthCheckPath: /healthz
            envVars:
              - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
                value: "true"
              - key: EXECUTIONS_MODE
                value: queue
              - key: QUEUE_BULL_REDIS_HOST
                fromService:
                  name: pdvs-redis-broker
                  property: host
              - key: QUEUE_BULL_REDIS_PORT
                fromService:
                  name: pdvs-redis-broker
                  property: port
              - key: DB_TYPE
                value: postgresdb
              - key: DB_POSTGRESDB_URL
                fromDatabase:
                  name: pdvs-db-prod
                  property: connectionString
              - key: N8N_ENCRYPTION_KEY
                value: "8761db1d45be89f8a85ebd792fe60ffe5343d9c21fe9b404a6bf960151fe02d4"
              - key: WEBHOOK_URL
                value: https://n8n-app-gglg.onrender.com/
              - key: EXECUTIONS_DATA_SAVE_ON_SUCCESS
                value: none
              - key: EXECUTIONS_DATA_PRUNE
                value: "true"
              - key: EXECUTIONS_DATA_MAX_AGE
                value: "24"
              - key: NODE_OPTIONS
                value: "--max-old-space-size=450" # Ajustado para o limite real do plano Free (~512MB)

          # 3. n8n Worker (Quem realmente trabalha)
          - type: worker
            name: n8n-worker-heavy
            env: docker
            dockerfilePath: ./n8n/Dockerfile
            plan: free
            region: oregon
            # numInstances: 2 # O plano Free da Render NÃO permite múltiplas instâncias
            envVars:
              - key: EXECUTIONS_MODE
                value: queue
              - key: QUEUE_BULL_REDIS_HOST
                fromService:
                  name: pdvs-redis-broker
                  property: host
              - key: DB_TYPE
                value: postgresdb
              - key: DB_POSTGRESDB_URL
                fromDatabase:
                  name: pdvs-db-prod
                  property: connectionString
              - key: NODE_OPTIONS
                value: "--max-old-space-size=450"

          # 4. Evolution API
          - type: web
            name: evolution-api
            env: docker
            dockerfilePath: ./evolution/Dockerfile
            plan: free
            region: oregon
            envVars:
              - key: DATABASE_ENABLED
                value: "true"
              - key: DATABASE_PROVIDER
                value: postgresql
              - key: DATABASE_CONNECTION_URI
                fromDatabase:
                  name: pdvs-db-prod
                  property: connectionString
              - key: CACHE_REDIS_ENABLED
                value: "true"
              - key: CACHE_REDIS_URI
                fromService:
                  name: pdvs-redis-broker
                  property: connectionString
              - key: SERVER_URL
                value: https://evolution-api.onrender.com 
              - key: AUTHENTICATION_API_KEY
                value: 5da2b7cd3b04394e9cc091cc9748a508e4572c7feaa33489d4ff13a8ddce6bb6

        # AQUI ESTÁ A CORREÇÃO: Databases ficam fora da lista de 'services'
        databases:
          - name: pdvs-db-prod
            databaseName: n8n_evolution_db
            user: admin_pdvs
            plan: free
            region: oregon