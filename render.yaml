services:
  - type: web
    name: n8n-app
    env: docker
    dockerfilePath: ./n8n/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 5678
      - key: N8N_PORT
        value: 5678
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: DB_POSTGRESDB_TIMEOUT
        value: "60000" 
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_TASKS_RUNNER_JS_ENABLED
        value: "true" #
      - key: N8N_TASKS_RUNNER_PYTHON_ENABLED
        value: "true" #
    disk:
      name: n8n-storage
      mountPath: /home/node/.n8n
      sizeGB: 1

  - type: web
    name: evolution-api
    env: docker
    dockerfilePath: ./evolution/Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: DATABASE_CONNECTION_URI
        value: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}/${DB_NAME}?schema=evolution
      - key: DB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: n8n-db
          property: database
      - key: CACHE_REDIS_URI
        fromService: 
          type: keyvalue
          name: n8n-cache
          property: connectionString
      - key: AUTHENTICATION_API_KEY
        value: 5da2b7cd3b04394e9cc091cc9748a508e4572c7feaa33489d4ff13a8ddce6bb6
      - key: SERVER_URL
        value: https://evolution-api.onrender.com

  - type: keyvalue
    name: n8n-cache
    region: oregon
    plan: free 
    ipAllowList: [] 

databases:
  - name: n8n-db
    plan: free
    region: oregon