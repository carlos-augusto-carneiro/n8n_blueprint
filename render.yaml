projects:
  - name: Whatsapp PDVS
    environments:
      - name: testing 
        services:
          - type: web
            name: n8n-app
            env: docker
            dockerfilePath: ./n8n/Dockerfile
            plan: free
            region: oregon
            healthCheckPath: /healthz
            envVars:
              - key: PORT
                value: 5678
              - key: N8N_PORT
                value: 5678
              - key: DB_TYPE
                value: "postgresdb"
              - key: DB_POSTGRESDB_URL
                fromDatabase:
                  name: n8n-db
                  property: connectionString
              - key: DB_POSTGRESDB_HOST
                fromDatabase:
                  name: n8n-db
                  property: host
              - key: DB_POSTGRESDB_DATABASE
                fromDatabase:
                  name: n8n-db
                  property: database
              - key: DB_POSTGRESDB_USER
                fromDatabase:
                  name: n8n-db
                  property: user
              - key: DB_POSTGRESDB_PASSWORD
                fromDatabase:
                  name: n8n-db
                  property: password
              - key: WEBHOOK_URL
                value: https://n8n-app-gglg.onrender.com/
              - key: N8N_ENCRYPTION_KEY
                value: "8761db1d45be89f8a85ebd792fe60ffe5343d9c21fe9b404a6bf960151fe02d4"
              - key: N8N_TASKS_RUNNER_JS_ENABLED
                value: "true" #
              - key: N8N_TASKS_RUNNER_PYTHON_ENABLED
                value: "true" #

              - key: NODE_OPTIONS
                value: "--max-old-space-size=400"
                
              # 2. Desliga o salvamento de logs de execuções com sucesso (Economiza MUITA RAM e CPU)
              - key: EXECUTIONS_DATA_SAVE_ON_SUCCESS
                value: "none"
                
              # 3. Não salva o progresso nó por nó na memória
              - key: EXECUTIONS_DATA_SAVE_ON_PROGRESS
                value: "false"
                
              # 4. Limpa execuções antigas a cada 24h
              - key: EXECUTIONS_DATA_PRUNE
                value: "true"
              - key: EXECUTIONS_DATA_MAX_AGE
                value: "24"

            
          # 2. Evolution API (v2.3.6 / v2.14.2)
          - type: web
            name: evolution-api
            env: docker
            dockerfilePath: ./evolution/Dockerfile
            plan: free
            region: oregon
            envVars:
              - key: PORT
                value: 8080
              - key: DATABASE_ENABLED
                value: "true"
              - key: DATABASE_PROVIDER
                value: postgresql
              # MONTAGEM DA URL DO BANCO (Postgres)
              # Aqui evitamos o erro "invalid provider" forçando o prefixo postgresql://
              - key: DATABASE_CONNECTION_URI
                fromDatabase:
                  name: n8n-db
                  property: connectionString
            

              # CONFIGURAÇÃO DO CACHE (Redis / Key Value)
              # Importante: A chave para o Redis DEVE ser CACHE_REDIS_URI
              - key: CACHE_REDIS_URI
                fromService:
                  type: keyvalue
                  name: n8n-cache
                  property: connectionString

              # CONFIGURAÇÕES GERAIS
              - key: AUTHENTICATION_API_KEY
                value: 5da2b7cd3b04394e9cc091cc9748a508e4572c7feaa33489d4ff13a8ddce6bb6
              - key: SERVER_URL
                value: https://evolution-api.onrender.com # Ajuste com sua URL do Render
              - key: DELAY_MESSAGES
                value: "true"

          - type: keyvalue
            name: n8n-cache
            region: oregon
            plan: free 
            ipAllowList: [] 

        databases:
          - name: n8n-db
            plan: free
            region: oregon